<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
<title id="title">Forum evidence to agent skill memory flow</title>
<desc id="desc">Public-safe diagram showing how forum evidence becomes skill memory, submission policy, repair queues, and human review boundaries.</desc>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#5c6670"/>
  </marker>
  <style>
    text { font-family: Inter, Segoe UI, Arial, sans-serif; fill: #17202a; letter-spacing: 0; }
    .title { font-size: 28px; font-weight: 700; }
    .subtitle { font-size: 15px; fill: #5c6670; }
    .label { font-size: 15px; font-weight: 700; }
    .body { font-size: 13px; fill: #5c6670; }
    .tiny { font-size: 12px; fill: #5c6670; }
    .metric { font-size: 20px; font-weight: 700; }
  </style>
</defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="48" y="54" class="title">WQ Community Skills: forum evidence becomes agent policy</text>
<text x="48" y="82" class="subtitle">A privacy-safe pipeline for turning community lessons into gates, repair routes, and human-reviewed submit boundaries.</text>

<rect x="54" y="140" width="160" height="118" rx="8" fill="#f7f9fb" stroke="#d8dde3" stroke-width="2"/>
<text x="72" y="172" class="label">Forum evidence</text>
<text x="72" y="198" class="body">posts, comments,</text>
<text x="72" y="216" class="body">local notes, failed</text>
<text x="72" y="234" class="body">run summaries</text>

<rect x="258" y="140" width="160" height="118" rx="8" fill="#eaf1ff" stroke="#2f6fed" stroke-width="2"/>
<text x="276" y="172" class="label">Triage</text>
<text x="276" y="198" class="body">value type, risk</text>
<text x="276" y="216" class="body">flags, fields,</text>
<text x="276" y="234" class="body">operators</text>

<rect x="462" y="140" width="160" height="118" rx="8" fill="#e8f6ee" stroke="#1f9d55" stroke-width="2"/>
<text x="480" y="172" class="label">Skill memory</text>
<text x="480" y="198" class="body">routes, stop</text>
<text x="480" y="216" class="body">conditions, repair</text>
<text x="480" y="234" class="body">actions</text>

<rect x="666" y="140" width="160" height="118" rx="8" fill="#fff4df" stroke="#c47f17" stroke-width="2"/>
<text x="684" y="172" class="label">Submission policy</text>
<text x="684" y="198" class="body">block, penalize,</text>
<text x="684" y="216" class="body">allow, refresh</text>
<text x="684" y="234" class="body">checks</text>

<rect x="870" y="140" width="190" height="118" rx="8" fill="#fdecec" stroke="#d64545" stroke-width="2"/>
<text x="888" y="172" class="label">Human boundary</text>
<text x="888" y="198" class="body">no direct submit</text>
<text x="888" y="216" class="body">from forum content</text>
<text x="888" y="234" class="body">or pending checks</text>

<line x1="214" y1="199" x2="258" y2="199" stroke="#5c6670" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="418" y1="199" x2="462" y2="199" stroke="#5c6670" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="622" y1="199" x2="666" y2="199" stroke="#5c6670" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="826" y1="199" x2="870" y2="199" stroke="#5c6670" stroke-width="2.2" marker-end="url(#arrow)"/>

<rect x="90" y="338" width="254" height="92" rx="8" fill="#f7f9fb" stroke="#d8dde3"/>
<text x="110" y="368" class="label">Gates</text>
<text x="110" y="394" class="body">block unsafe templates, stale checks,</text>
<text x="110" y="412" class="body">duplicates, and unsupported inputs</text>

<rect x="434" y="338" width="254" height="92" rx="8" fill="#f7f9fb" stroke="#d8dde3"/>
<text x="454" y="368" class="label">Repair routes</text>
<text x="454" y="394" class="body">choose metric overlay, settings</text>
<text x="454" y="412" class="body">isolation, or family shift</text>

<rect x="778" y="338" width="254" height="92" rx="8" fill="#f7f9fb" stroke="#d8dde3"/>
<text x="798" y="368" class="label">Policy constraints</text>
<text x="798" y="394" class="body">prefer fresh checks, low similarity,</text>
<text x="798" y="412" class="body">and transformed source families</text>

<rect x="166" y="498" width="214" height="62" rx="8" fill="#eaf1ff" stroke="#2f6fed"/>
<text x="184" y="523" class="body">Public artifacts</text>
<text x="184" y="546" class="metric">redacted and synthetic</text>

<rect x="452" y="498" width="214" height="62" rx="8" fill="#e8f6ee" stroke="#1f9d55"/>
<text x="470" y="523" class="body">Agent behavior</text>
<text x="470" y="546" class="metric">safer next action</text>

<rect x="738" y="498" width="214" height="62" rx="8" fill="#fdecec" stroke="#d64545"/>
<text x="756" y="523" class="body">Private data</text>
<text x="756" y="546" class="metric">never exported</text>

<text x="48" y="600" class="tiny">What this proves: this repository is a skill-memory architecture, not a formula dump.</text>
</svg>
